openapi: 3.0.0
info:
  title: API - App y Usuarios
  version: 1.0.0
  description: Documentación de los endpoints principales del juego (Gestión de Usuarios y Webapp).
servers:
  - url: https://localhost
    description: 🛡️ Backend Principal (A través de Nginx)
  - url: http://localhost:3000
    description: ⚙️ Backend Directo (Node.js)

tags:
  - name: Usuarios
    description: Gestión de cuentas, registro y autenticación.
  - name: Webapp
    description: Endpoints principales del juego (partidas, movimientos, matchmaking...).

paths:
  /createuser:
    post:
      tags:
        - Usuarios
      summary: Registrar un nuevo usuario
      description: Crea un nuevo usuario en la base de datos. Requiere un username, email y contraseña válidos (mínimo 3 caracteres).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        '201':
          description: Usuario creado exitosamente.
          content:
            application/json:
              example:
                message: "User successfully created"
                userId: "60d0fe4f5311236168a109ca"
                username: "jugador1"
        '400':
          description: Error de validación (campos faltantes o incorrectos).
          content:
            application/json:
              examples:
                FaltanCampos:
                  summary: Faltan campos requeridos
                  value: { "error": "All fields are required" }
                PassCorta:
                  summary: Contraseña muy corta
                  value: { "error": "Password must be at least 3 characters" }
        '409':
          description: Conflicto - El usuario o email ya existen.
          content:
            application/json:
              examples:
                EmailEnUso:
                  summary: Email ya registrado
                  value: { "error": "Email already registered" }
                UserEnUso:
                  summary: Username ya en uso
                  value: { "error": "Username already taken" }
        '500':
          description: Error interno del servidor.

  /login:
    post:
      tags:
        - Usuarios
      summary: Iniciar sesión
      description: Autentica a un usuario y devuelve un token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login exitoso. Devuelve los datos del usuario y el Token JWT.
          content:
            application/json:
              example:
                message: "Login successful"
                userId: "60d0fe4f5311236168a109ca"
                username: "jugador1"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: No autorizado - Contraseña incorrecta.
          content:
            application/json:
              example:
                error: "Invalid password"
        '404':
          description: No encontrado - El usuario no existe en la base de datos.
          content:
            application/json:
              example:
                error: "User not found"

components:
  schemas:
    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          example: "jugador1"
        email:
          type: string
          format: email
          example: "jugador1@email.com"
        password:
          type: string
          minLength: 3
          example: "mipassword123"
    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "jugador1@email.com"
        password:
          type: string
          example: "mipassword123"