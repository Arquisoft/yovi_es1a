openapi: 3.0.0
info:
  title: API - App y Usuarios
  version: 1.0.0
  description: Documentación de los endpoints principales del juego (Gestión de Usuarios y Webapp).
servers:
  - url: https://localhost
    description: 🛡️ Backend Principal (A través de Nginx)
  - url: http://localhost:3000
    description: ⚙️ Backend Directo (Node.js)

tags:
  - name: Usuarios
    description: Gestión de cuentas, registro y autenticación.
  - name: Partidas
    description: Guardado de resultados, historiales y ranking global.
  - name: Clanes
    description: Creación de clanes, gestión de miembros y chat interno.
  - name: Motor IA
    description: Puente de comunicación con el motor de Rust para calcular movimientos y victorias.

paths:
  # ==========================================
    # USUARIOS
  # ==========================================
  /createuser:
    post:
      tags:
        - Usuarios
      summary: Registrar un nuevo usuario
      description: Crea un nuevo usuario en la base de datos. Requiere un username, email y contraseña válidos (mínimo 3 caracteres).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        '201':
          description: Usuario creado exitosamente.
          content:
            application/json:
              example:
                message: "User successfully created"
                userId: "60d0fe4f5311236168a109ca"
                username: "jugador1"
        '400':
          description: Error de validación (campos faltantes o incorrectos).
          content:
            application/json:
              examples:
                FaltanCampos:
                  summary: Faltan campos requeridos
                  value: { "error": "All fields are required" }
                PassCorta:
                  summary: Contraseña muy corta
                  value: { "error": "Password must be at least 3 characters" }
        '409':
          description: Conflicto - El usuario o email ya existen.
          content:
            application/json:
              examples:
                EmailEnUso:
                  summary: Email ya registrado
                  value: { "error": "Email already registered" }
                UserEnUso:
                  summary: Username ya en uso
                  value: { "error": "Username already taken" }
        '500':
          description: Error interno del servidor.

  /login:
    post:
      tags:
        - Usuarios
      summary: Iniciar sesión
      description: Autentica a un usuario y devuelve un token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login exitoso. Devuelve los datos del usuario y el Token JWT.
          content:
            application/json:
              example:
                message: "Login successful"
                userId: "60d0fe4f5311236168a109ca"
                username: "jugador1"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: No autorizado - Contraseña incorrecta.
          content:
            application/json:
              example:
                error: "Invalid password"
        '404':
          description: No encontrado - El usuario no existe en la base de datos.
          content:
            application/json:
              example:
                error: "User not found"
  # ==========================================
    # PARTIDAS
  # ==========================================
  /matches:
    post:
      tags:
        - Partidas
      summary: Guardar una nueva partida
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, result]
              properties:
                user:
                  type: string
                result:
                  type: string
                  enum: [win, lose, surrender]
                boardSize:
                  type: integer
                duration:
                  type: integer
responses:
        '201':
          description: Partida guardada correctamente.
        '400':
          description: Error de validación.
          content:
            application/json:
              example:
                error: "No user ID received."
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              example:
                error: "Error saving match"

  /matches/ranking/global:
    get:
      tags:
        - Partidas
      summary: Obtener el ranking global de jugadores
      responses:
        '200':
          description: Ranking calculado exitosamente.
        '500':
          description: Error de base de datos.
          content:
            application/json:
              example:
                error: "Internal server error while fetching ranking"

/matches/user/{userId}:
    get:
      tags:
        - Partidas
      summary: Obtener historial de partidas de un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
        - name: result
          in: query
          schema:
            type: string
        - name: maxMoves
          in: query
          schema:
            type: integer
        - name: maxDuration
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Historial obtenido correctamente.
        '400':
          description: Formato de entrada inválido.
          content:
            application/json:
              example:
                error: "Invalid input format"
        '404':
          description: Faltó enviar el ID del usuario.
          content:
            application/json:
              example:
                error: "User ID is required"
        '500':
          description: Error interno obteniendo el historial.
          content:
            application/json:
              example:
                error: "Internal server error while fetching history"

  # ==========================================
    # CLANES
  # ==========================================
  /clans:
    get:
      tags:
        - Clanes
      summary: Obtener todos los clanes
      responses:
        '200':
          description: Lista de clanes obtenida.
        '500':
          description: Error de servidor.
          content:
            application/json:
              example:
                error: "Error cargando clanes"

/clans/ranking/global:
    get:
      tags:
        - Clanes
      summary: Ranking global de Clanes
      responses:
        '200':
          description: Ranking de clanes obtenido.
        '500':
          description: Error en la agregación.
          content:
            application/json:
              example:
                error: "Error interno obteniendo el ranking de clanes"

/clans/createClan:
    post:
      tags:
        - Clanes
      summary: Crear un nuevo clan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, memberIds]
              properties:
                name:
                  type: string
                memberIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Clan creado exitosamente.
        '400':
          description: Error de validación.
          content:
            application/json:
              example:
                error: "Clan name is required"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              example:
                error: "Error creating clan"

/clans/{clanId}/addUser:
    post:
      tags:
        - Clanes
      summary: Añadir usuario a un clan
      parameters:
        - name: clanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: Usuario añadido correctamente.
        '400':
          description: Faltan datos o validación fallida.
          content:
            application/json:
              example:
                error: "User ID is required"
        '404':
          description: El clan no existe.
          content:
            application/json:
              example:
                error: "Clan not found"
        '500':
          description: Error de servidor.
          content:
            application/json:
              example:
                error: "Error adding member to clan"

components:
  schemas:
    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          example: "jugador1"
        email:
          type: string
          format: email
          example: "jugador1@email.com"
        password:
          type: string
          minLength: 3
          example: "mipassword123"
    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "jugador1@email.com"
        password:
          type: string
          example: "mipassword123"